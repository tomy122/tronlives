<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON LIVES</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="boot">
        INITIALIZING GRID...
    </div>

    <div id="content">

        <img src="logo.jpg" class="logo">

        <p id="enter">
            PRESS ENTER TO CONNECT
        </p>

        <div id="login">

            <p class="prompt">
                ENTER USER ID:
            </p>

            <p id="username">
                >
            </p>

        </div>

        <div id="terminal-screen">

            <div id="terminal"></div>

            <span id="cursor">█</span>

        </div>

    </div>

    <audio id="startup">
        <source src="startup.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>

</html>
